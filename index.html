<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BABYMONSTER Quiz - by ZOHAR</title>
    <style>
        :root { --red: #e60012; --black: #1a1a1a; --white: #ffffff; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: var(--black); color: var(--white); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; text-align: center; }
        #quiz-container { background-color: var(--white); color: var(--black); padding: 2.5rem; border-radius: 20px; width: 100%; max-width: 450px; box-shadow: 0 10px 40px rgba(230, 0, 18, 0.5); }
        .main-title { color: var(--red); font-size: 1.8rem; font-weight: bold; margin-bottom: 5px; }
        .author-tag { color: var(--red); font-size: 1rem; font-weight: bold; margin-bottom: 20px; display: block; }
        .question { font-size: 1.3rem; font-weight: bold; margin-bottom: 25px; min-height: 50px; }
        .options { display: grid; gap: 12px; }
        button { background-color: #f4f4f4; border: 2px solid #ddd; padding: 15px; border-radius: 10px; cursor: pointer; font-size: 1.1rem; font-weight: 600; transition: 0.2s; font-family: inherit; }
        button:hover { background-color: var(--red); color: white; border-color: var(--red); transform: translateY(-2px); }
        #result { display: none; }
        .member-img { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; border: 5px solid var(--red); margin: 20px auto; display: block; background-color: #eee; }
        .member-name { font-size: 2.8rem; color: var(--red); font-weight: bold; margin: 10px 0; }
        .restart-btn { margin-top: 25px; background-color: var(--black); color: white; width: 100%; padding: 15px; border-radius: 10px; cursor: pointer; border: none; font-size: 1rem; font-weight: bold; }
        #progress { font-size: 0.9rem; color: #777; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-screen">
        <div class="main-title">לאיזה ממברית את הכי דומה?</div>
        <div class="author-tag">BY ZOHAR</div>
        <p id="progress"></p>
        <div class="question" id="question-text">טוען שאלון...</div>
        <div class="options" id="options-container"></div>
    </div>

    <div id="result">
        <h2>את הכי דומה ל...</h2>
        <img id="member-pic" src="" alt="Member" class="member-img">
        <div class="member-name" id="member-res"></div>
        <p id="member-desc" style="font-size: 1.2rem; line-height: 1.4;"></p>
        <button class="restart-btn" onclick="location.reload()">שחקי שוב!</button>
    </div>
</div>

<script>
    const questions = [
        { q: "מה התפקיד המועדף עלייך בלהקה?", options: [{t:"ראפרית עוצמתית", m:"Ahyeon"}, {t:"ווקאליסטית מרגשת", m:"Rora"}, {t:"מכונת ריקודים", m:"Asa"}, {t:"הוויזואלית המתוקה", m:"Chiquita"}] },
        { q: "איך החברים מתארים אותך?", options: [{t:"מוכשרת בהכל", m:"Ahyeon"}, {t:"שקטה ואלגנטית", m:"Rami"}, {t:"מצחיקה ואנרגטית", m:"Pharita"}, {t:"קולית ומסתורית", m:"Ruka"}] },
        { q: "מה הסטייל האהוב עלייך?", options: [{t:"סטריט-וור קשוח", m:"Ruka"}, {t:"יוקרתי ועדין", m:"Pharita"}, {t:"נוח ומגניב", m:"Asa"}, {t:"טרנדי ונועז", m:"Chiquita"}] },
        { q: "מה הכי חשוב לך על הבמה?", options: [{t:"כריזמה ונוכחות", m:"Ahyeon"}, {t:"דיוק בריקוד", m:"Asa"}, {t:"להעביר רגש", m:"Rora"}, {t:"חיוך וביטחון", m:"Rami"}] }
    ];

    // כאן הקפדתי על סיומת .jpeg ושמות תואמים ל-GitHub שלך
    const memberData = {
        "Ahyeon": { img: "ahyeon.jpeg", desc: "את ה-All-Rounder המושלמת! כריזמטית ומוכשרת בהכל." },
        "Ruka": { img: "ruka.jpeg", desc: "את מגניבה, בוגרת ויש לך נוכחות חזקה שאי אפשר לפספס." },
        "Chiquita": { img: "chiquita.jpeg", desc: "את מלאה באנרגיה, שמחת חיים וכישרון טבעי מתפרץ!" },
        "Asa": { img: "asa.jpeg", desc: "את חדה, פרפקציוניסטית ויודעת להשקיע כדי להיות הכי טובה." },
        "Pharita": { img: "pharita.jpeg", desc: "את אלגנטית, מקסימה ובעלת וייב של נסיכה אמיתית." },
        "Rora": { img: "rora.jpeg", desc: "את קלאסית, רגועה ומביאה המון עומק ורוגע לכל מקום." },
        "Rami": { img: "rami.jpeg", desc: "את ווקאליסטית עוצמתית עם אישיות ייחודית וממגנטת!" }
    };

    let current = 0;
    let scores = {};

    function initQuiz() {
        const q = questions[current];
        const progressEl = document.getElementById("progress");
        const questionTextEl = document.getElementById("question-text");
        const optionsContainer = document.getElementById("options-container");

        if (!q) return;

        progressEl.innerText = `שאלה ${current + 1} מתוך ${questions.length}`;
        questionTextEl.innerText = q.q;
        optionsContainer.innerHTML = "";
        
        q.options.forEach(opt => {
            const btn = document.createElement("button");
            btn.innerText = opt.t;
            btn.onclick = () => {
                scores[opt.m] = (scores[opt.m] || 0) + 1;
                current++;
                if (current < questions.length) {
                    initQuiz();
                } else {
                    showFinalResult();
                }
            };
            optionsContainer.appendChild(btn);
        });
    }

    function showFinalResult() {
        document.getElementById("quiz-screen").style.display = "none";
        document.getElementById("result").style.display = "block";
        
        const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        
        document.getElementById("member-res").innerText = winner;
        document.getElementById("member-pic").src = memberData[winner].img;
        document.getElementById("member-desc").innerText = memberData[winner].desc;
    }

    // הפעלה ראשונית של השאלון
    window.onload = initQuiz;
</script>

</body>
</html>
